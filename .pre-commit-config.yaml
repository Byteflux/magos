repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy via the unsupported `language: system` escape hatch. pre-commit
  # hides the project from hook venvs by design (per the framework author),
  # so the supported `mirrors-mypy` hook can't see our deps. Enumerating
  # ~25 deps in `additional_dependencies` works but resolves against PyPI
  # rather than uv.lock and rebuilds a multi-GB isolated venv on every
  # autoupdate.
  #
  # TODO: add a GitHub Actions workflow that runs `uv run mypy` against the
  # locked venv with a persistent cache, then drop mypy from this file.
  # Pre-commit is built for fast per-file checks (ruff), not whole-project
  # type-checking.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file=pyproject.toml
        language: system
        types: [python]
        pass_filenames: false
