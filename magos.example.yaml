# magos routing config: declarative rule-based dispatch.
#
# Copy this file to ``magos.yaml`` (or set ``MAGOS_CONFIG_PATH``) and edit
# rules to match your deployment. Rules are evaluated in order; the first
# match wins. An unmatched request returns 404 with an endpoint-shaped
# error envelope.
#
# Match expression grammar:
#   - atoms: model / header / endpoint / jq
#   - matchers (for non-jq atoms): { literal: ... } | { glob: ... } | { regex: ... }
#   - combinators: all_of / any_of / not (recursive)
# Rewrite ops:
#   - set_model / set_header / add_header / remove_header / jq_patch / compress
# Action fields:
#   - provider, mode (translate|passthrough), base_url, api_key_env

# ingress: how requests reach magos. Two channels feed the same routing
# engine -- the always-on FastAPI HTTP listener (ingress.http) and the
# optional in-process mitmproxy HTTPS_PROXY listener (ingress.mitm).
#
# ingress.http.host / ingress.http.port are the FastAPI bind. They can
# also be set via MAGOS_HOST / MAGOS_PORT (env wins). When
# ingress.mitm.enabled is true, an embedded mitmproxy listener runs
# alongside FastAPI on the same process and same asyncio loop. A client
# whose ``HTTPS_PROXY`` points at ``mitm.host:mitm.port`` will see
# TLS interception (and routing-rule evaluation) for any host that
# matches ``intercept_hosts`` (or its subdomains). Everything else flows
# through un-MITM'd. See docs/ingress.md for the one-time CA trust step.
#
# Loop hazard: don't set HTTPS_PROXY system-wide, or magos's own outbound
# httpx will be re-intercepted. Restrict it to the client environment, or
# set NO_PROXY=localhost,127.0.0.1 for the magos process.
ingress:
  http:
    host: 127.0.0.1
    port: 8000
  mitm:
    enabled: false
    host: 127.0.0.1
    port: 8080
    intercept_hosts:
      - api.anthropic.com

# Default: Headroom compression on every request. Token mode runs the full
# pipeline (CacheAligner + ContentRouter + IntelligentContext) where the
# endpoint supports it (/v1/messages, /v1/messages/count_tokens,
# /v1/chat/completions); /v1/responses no-ops in token mode (use a per-rule
# ``compress: { mode: cache }`` if you want cache-alignment there). To
# disable globally, set ``pre_rewrites: []``.
pre_rewrites:
  - compress: {}

rules:
  # Anthropic-shape requests for claude-* models -> passthrough to
  # api.anthropic.com. Preserves OAuth bearers, anthropic-beta flags,
  # and version pins.
  - name: anthropic-messages-passthrough
    match:
      all_of:
        - endpoint: { literal: /v1/messages }
        - model: { regex: "^(anthropic/)?claude-.*" }
    action:
      provider: anthropic
      mode: passthrough
      base_url: https://api.anthropic.com
      api_key_env: ANTHROPIC_API_KEY

  # Anthropic count_tokens for claude-* via litellm.acount_tokens, which
  # auto-selects the provider's native count-tokens endpoint for accurate,
  # provider-billed counts.
  - name: anthropic-count-tokens
    match:
      all_of:
        - endpoint: { literal: /v1/messages/count_tokens }
        - model: { regex: "^(anthropic/)?claude-.*" }
    action:
      provider: anthropic
      mode: translate
      api_key_env: ANTHROPIC_API_KEY

  # Anthropic-shape requests targeting OpenAI / o-series models -> translate.
  # litellm.anthropic_messages performs the cross-provider translation
  # (Anthropic shape in -> OpenAI upstream -> Anthropic shape out).
  - name: openai-via-anthropic-shape
    match:
      all_of:
        - endpoint: { literal: /v1/messages }
        - model: { regex: "^(openai/)?(gpt-|o[134]-).*" }
    action:
      provider: openai
      mode: translate
      api_key_env: OPENAI_API_KEY

  # OpenAI-shape requests pass through litellm with whatever provider the
  # rule declares. Default rule: route by model prefix to OpenAI.
  - name: openai-chat-completions
    match:
      all_of:
        - endpoint: { literal: /v1/chat/completions }
        - model: { regex: "^(openai/)?(gpt-|o[134]-).*" }
    action:
      provider: openai
      mode: translate
      api_key_env: OPENAI_API_KEY

  # OpenAI-shape requests for claude-* go to anthropic via litellm
  # (litellm handles the OpenAI -> Anthropic translation internally).
  - name: anthropic-via-openai-shape
    match:
      all_of:
        - endpoint: { literal: /v1/chat/completions }
        - model: { regex: "^(anthropic/)?claude-.*" }
    action:
      provider: anthropic
      mode: translate
      api_key_env: ANTHROPIC_API_KEY

  # OpenAI Responses API: translate-mode through litellm.aresponses.
  - name: openai-responses
    match:
      endpoint: { literal: /v1/responses }
    action:
      provider: openai
      mode: translate
      api_key_env: OPENAI_API_KEY

  # Auxiliary OpenAI Responses endpoints (retrieve / cancel / list input
  # items). Passthrough-only: there is no litellm equivalent. Match
  # expressions see the templated path; the dispatcher forwards the
  # concrete inbound path so the upstream sees the real response id.
  - name: openai-responses-aux
    match:
      any_of:
        - endpoint: { literal: "/v1/responses/{id}" }
        - endpoint: { literal: "/v1/responses/{id}/input_items" }
    action:
      provider: openai
      mode: passthrough
      base_url: https://api.openai.com
      api_key_env: OPENAI_API_KEY

  # Anthropic count_tokens fallback for non-claude models: routes through
  # litellm.acount_tokens, which auto-picks an in-process tokenizer for
  # any LiteLLM-recognised model.
  - name: count-tokens-fallback
    match:
      endpoint: { literal: /v1/messages/count_tokens }
    action:
      provider: openai
      mode: translate

  # Example: enable Headroom compression for long-context Claude requests.
  # ``mode: token`` runs the full pipeline (CacheAligner + ContentRouter +
  # IntelligentContext); ``mode: cache`` only stabilises the prefix for
  # provider prompt-cache hits without rewriting message content.
  #
  # - name: claude-compress-long-context
  #   match:
  #     all_of:
  #       - endpoint: { literal: /v1/messages }
  #       - model: { regex: "^(anthropic/)?claude-.*" }
  #       - jq: ".messages | length > 30"
  #   rewrites:
  #     - compress:
  #         mode: token
  #         protect_recent: 8
  #         target_ratio: 0.6
  #   action:
  #     provider: anthropic
  #     mode: translate

  # Example: cache-align the OpenAI Responses ``instructions`` prefix.
  # /v1/responses supports ``mode: cache`` only (against ``instructions``);
  # token-mode compression of the ``input`` field is not implemented.
  #
  # - name: responses-cache-align
  #   match:
  #     endpoint: { literal: /v1/responses }
  #   rewrites:
  #     - compress: { mode: cache }
  #   action:
  #     provider: openai
  #     mode: translate

# Optional: model registry. When ``providers:`` is non-empty, magos polls
# each provider's discovery endpoint, persists ``models.json``, and falls
# back to auto-routing for requests no rule matches. Explicit rules above
# always win; the registry only catches the unmatched. See docs/registry.md
# for the full grammar and lifecycle.
#
provider_order: [anthropic, openai, openrouter, vultr]

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    discovery: anthropic
  openai:
    api_key_env: OPENAI_API_KEY
    discovery: openai
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    discovery: openrouter
  vultr:
    api_key_env: VULTR_API_KEY
    discovery: vultr

# registry:
#   refresh_interval: 2h
#   on_unknown_model: error
#   # ~ expands; absolute passes through; relative anchors to $MAGOS_HOME (default
#   # ~/.magos). Defaults to $MAGOS_HOME/models.json. Override at runtime with
#   # MAGOS_MODELS_PATH (same path semantics, wins over the yaml value).
#   models_path: models.json
