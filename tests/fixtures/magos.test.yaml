# Routing fixture used by unit and integration tests.
#
# Mirrors today's translate-path behavior so existing tests that mock the
# completion callable still see the expected (provider-prefixed) model and
# headers. Passthrough is enabled for claude- only on /v1/messages, which
# the passthrough tests bypass entirely by exercising passthrough.py
# directly with httpx.MockTransport.

pre_transforms: []

rules:
  - name: anthropic-passthrough
    match:
      all_of:
        - endpoint: { literal: /v1/messages }
        - model: { regex: "^claude-.*" }
    target:
      provider: anthropic
      gateway: passthrough
      base_url: https://api.anthropic.com
      api_key_env: ANTHROPIC_API_KEY

  - name: openai-translate-messages
    match:
      endpoint: { literal: /v1/messages }
    target:
      provider: openai
      gateway: translate

  - name: openai-translate-chat
    match:
      endpoint: { literal: /v1/chat/completions }
    target:
      provider: openai
      gateway: translate

  - name: openai-translate-responses
    match:
      endpoint: { literal: /v1/responses }
    target:
      provider: openai
      gateway: translate

  - name: openai-responses-aux
    match:
      any_of:
        - endpoint: { literal: "/v1/responses/{id}" }
        - endpoint: { literal: "/v1/responses/{id}/input_items" }
    target:
      provider: openai
      gateway: passthrough
      base_url: https://api.openai.com
      api_key_env: OPENAI_API_KEY

  - name: count-tokens-fallback
    match:
      endpoint: { literal: /v1/messages/count_tokens }
    target:
      provider: openai
      gateway: translate
